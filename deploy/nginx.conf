upstream backend {
    # Blue/Green & Canary 热更新：
    #   Blue/Green: deploy.sh 通过 sed 切换 active/candidate 端口后执行 nginx -s reload
    #   Canary:     deploy.sh 通过 _set_nginx_canary_weight 动态设置 weight 实现按比例分流
    # 正常状态：仅 active 行处于活跃
    server backend:8000;          # active
    # server backend:8001;        # candidate（由 deploy.sh _deploy_backend_bluegreen / _deploy_backend_canary 管理）
    # Canary 灰度示例（由脚本自动生成，勿手动编辑）：
    #   server backend:8000 weight=90;   # active
    #   server backend:8001 weight=10;   # candidate (canary)
}

upstream frontend {
    server frontend:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP: 开发 / HTTP-only 场景 ──
# 多域名共享同一个 server 块，所有域名指向同一前后端服务。
# 生产环境建议仅用作 HTTPS 重定向（见下方 HTTPS 块）。
server {
    listen 80;
    # 多前端域名：空格分隔，所有域名共享同一后端
    server_name kilon.top excelmanus.com _;

    client_max_body_size 100m;

    # SSE streaming endpoints (do NOT use Connection: upgrade, or SSE will fail)
    location /api/v1/chat/stream {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /api/v1/chat/subscribe {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Other API requests -> backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Everything else -> frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

